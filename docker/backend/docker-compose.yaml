version: '3.8'
services:
  database-mysql:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_DATABASE=quocduong
      - MYSQL_ROOT_PASSWORD=123456
    ports:
      - '3308:3306'
    volumes:
      - ../../booking-be/quocduong.sql:/docker-entrypoint-initdb.d/quocduong.sql
    expose:
      - 3306
  backend:
    build:
      context: ../../booking-be
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DB_PORT=3306
      - DB_HOST=database-mysql
      #- DB_HOST=host.docker.internal
    ports:
      - 8080:8080
    #docker compose -p quocduong-nodejs-mysql up -d 