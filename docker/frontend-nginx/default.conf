server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for client-side routes like /home
    location / {
        # history-fallback cho SPA: nếu không có file tương ứng thì trả index.html
        root /usr/share/nginx/html;
        index index.html index.html;
        try_files $uri $uri/ /index.html;
    }

    # Serve built static assets directly
    location /static/ {
        try_files $uri =404;
    }
}
