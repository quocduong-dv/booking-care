upstream backend-booking-care {
    server backend:8080;
}
server {
    listen 80;
    listen [::]:80;
    server_name  localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for client-side routes like /home
    location / {
        # history-fallback cho SPA: nếu không có file tương ứng thì trả index.html
        root /usr/share/nginx/html;
        index index.html index.html;
        try_files $uri $uri/ /index.html;
    }

    # Serve built static assets directly
    location /static/ {
        try_files $uri =404;
    }
    location /api {
        proxy_pass http://backend-booking-care;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-NginX-Proxy true;
    }
}
