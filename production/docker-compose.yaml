version: '3.8'
services:
  database-mysql:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_DATABASE=quocduong
      - MYSQL_ROOT_PASSWORD=123456
   
    ports:
      - '3308:3306'
    # volumes:
    #   - ../../booking-be/quocduong.sql:/docker-entrypoint-initdb.d/quocduong.sql
    expose:
      - 3306
  backend:
    build:
      context: ../booking-be
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DB_PORT=3306
      - DB_HOST=database-mysql
      - URL_REACT=http://localhost
      #- DB_HOST=host.docker.internal
    ports:
      - 8080:8080
    expose:
      - 8080  
  nginx:
      image: nginx:1.23.3
      ports:
      - 80:80
      volumes:
       - ../booking-fe/build:/usr/share/nginx/html
       - ./default.conf:/etc/nginx/conf.d/default.conf
    #docker compose -p quocduong-sern up -d